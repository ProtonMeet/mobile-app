def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def meetHost = System.getenv('MEET_HOST')
if (meetHost == null) { meetHost = 'proton.me' }

def sentryAccountDSN = System.getenv('SENTRY_ACCOUNT_ANDROID_DSN')
if (sentryAccountDSN == null) { sentryAccountDSN = '' }

def sentryMeetDSN = System.getenv('SENTRY_MEET_DSN')
if (sentryMeetDSN == null) { sentryMeetDSN = '' }

repositories {
    flatDir {
        dirs 'libs'
    }
}

android {
    namespace "proton.android.meet"
    compileSdkVersion libs.versions.compileSdk.get().toInteger()
    
    // Force Kotlin version consistency
    configurations.all {
        resolutionStrategy {
            force "org.jetbrains.kotlin:kotlin-stdlib:${libs.versions.kotlin.get()}"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:${libs.versions.kotlin.get()}"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:${libs.versions.kotlin.get()}"
            force "org.jetbrains.kotlin:kotlin-stdlib-common:${libs.versions.kotlin.get()}"
        }
    }
    defaultConfig {
        applicationId "proton.android.meet"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        ndkVersion libs.versions.ndkVersion.get()
        targetSdkVersion libs.versions.targetSdk.get().toInteger()
        minSdkVersion libs.versions.minSdk.get().toInteger()

        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        buildConfigField("String", "SENTRY_ACCOUNT_DSN", "\"$sentryAccountDSN\"")
        buildConfigField("String", "SENTRY_MEET_DSN", "\"$sentryMeetDSN\"")
        buildConfigField("String", "MEET_HOST", "\"$meetHost\"")

        javaCompileOptions {
            annotationProcessorOptions {
                arguments["room.schemaLocation"] = "$projectDir/schemas"
                arguments["room.incremental"] = "true"
            }
        }
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
        
        resValue(
            "string", "asset_statements",
            """
            [{
            "relation": ["delegate_permission/common.handle_all_urls", "delegate_permission/common.get_login_creds"],
            "target": { "namespace": "web", "site": "https://proton.me" }
            }]
            """.stripIndent()
        )
    }

    compileOptions {
        coreLibraryDesugaringEnabled true

        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig true
        compose true
        dataBinding true // required by Core presentation
    }

    composeOptions {
        kotlinCompilerExtensionVersion libs.versions.androidx.compose.compiler.get()
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        main.jniLibs.srcDirs += 'src/main/jniLibs'
    }

    configurations {
        implementation.exclude group: 'com.intellij', module: 'annotations'
    }

    packagingOptions{
       pickFirst '**'
        // jniLibs {
        //     useLegacyPackaging = true
        // }
    }

    flavorDimensions "default"
    productFlavors {
        dev {
            dimension "default"
            applicationIdSuffix '.dev'
        }
        prod {
            dimension "default"
        }
    }
    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug

            debuggable false
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            ndk {
                abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
            }
        }
    }
}
